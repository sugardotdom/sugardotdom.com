<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outtakes / Play - Sugar.Dom</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #d90000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
            border-bottom: 1px solid #222;
            padding-bottom: 2rem;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        /* Mosaic Layout */
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            grid-auto-rows: 150px;
            grid-auto-flow: dense;
            gap: 5px;
            padding: 5px;
        }

        /* Floating Toggle */
        #toggle-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
            background: var(--accent-color);
            color: white;
            padding: 0.5rem 1rem;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.7rem;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .mosaic-item {
            overflow: hidden;
            background: #111;
        }

        .mosaic-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.5s ease, transform 0.5s ease;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -o-user-select: none;
            user-select: none;
            pointer-events: auto;
            /* Force disable dragging */
            -webkit-user-drag: none;
            user-drag: none;
        }

        /* Prevent image saving - Global */
        .mosaic-item img {
            -webkit-touch-callout: none;
        }

        /* Mobile specific - overlay capture */
        .mosaic-item {
            position: relative;
        }
        .mosaic-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            z-index: 5;
        }

        /* Focused View State */
        .focused {
            filter: grayscale(0%) !important;
            transform: scale(1.05);
            z-index: 10;
        }

        /* Prevent image saving - Mobile focus specific */
        .mosaic-item img {
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .mosaic-item img:hover {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .mosaic-item.tall { grid-row: span 2; }
        .mosaic-item.wide { grid-column: span 2; }
    </style>

    <div id="toggle-btn" onclick="toggleGrayscale()">BW / Color</div>
    <header>
        <h1>Outtakes / Play</h1>
        <a href="index.html">← Foundation</a>
    </header>

    <script>
        // Disable Right Click & Context Menu
        document.addEventListener('contextmenu', event => event.preventDefault());

        function toggleGrayscale() {
            const container = document.querySelector('.mosaic-grid');
            container.classList.toggle('force-color');
        }

        // Optimized Touch/Click handler
        const items = document.querySelectorAll('.mosaic-item');
        
        const showImage = (item) => {
            items.forEach(i => i.querySelector('img').classList.remove('focused'));
            const img = item.querySelector('img');
            img.classList.add('focused');
            img.style.objectFit = 'contain';
            img.style.backgroundColor = 'black';
        };

        items.forEach(item => {
            // Click/Tap handler
            item.addEventListener('click', (e) => {
                e.preventDefault();
                showImage(item);
            });

            // Prevent drag
            item.addEventListener('dragstart', (e) => e.preventDefault());
        });
    </script>
    <style>
        .force-color .mosaic-item img {
            filter: grayscale(0%) !important;
        }
    </style>
