<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar.Dom - The Alpha Standard</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #111111;
            --accent-color: #555555;
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0c0c0c;
                --text-color: #efefef;
                --accent-color: #a0a0a0;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        nav a {
            display: inline-block;
            text-decoration: none;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            font-size: 0.85rem;
            margin: 0 1rem;
            padding-bottom: 0.2rem;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        nav a:hover {
            border-color: var(--text-color);
        }

        .fade-in {
            animation: fadeIn 2s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container fade-in">
        <h1>Sugar.Dom</h1>
        <p>Foundations • Leadership • Lifestyle</p>
        
        <nav>
            <a href="https://your-cb-stream-link.com" target="_blank" rel="noopener">Live Stream</a>
            <a href="photos.html">Photography</a>
            <a href="cinema.html">Cinema</a>
            <a href="#">About</a>
        </nav>
    </div>
</body>
</html>
