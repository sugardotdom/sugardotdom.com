<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar.Dom - The Alpha Standard</title>
    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #111111;
            --accent-color: #555555;
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0c0c0c;
                --text-color: #efefef;
                --accent-color: #a0a0a0;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        nav a {
            display: inline-block;
            text-decoration: none;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            font-size: 0.85rem;
            margin: 0 1rem;
            padding-bottom: 0.2rem;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        nav a:hover {
            border-color: var(--text-color);
        }

        .socials {
            margin-top: 3rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .socials a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .socials a:hover {
            color: var(--text-color);
        }

        #stream-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #stream-container { width: 90vw; height: 80vh; display: flex; justify-content: center; align-items: center; }
        #stream-container iframe { width: 100%; height: 100%; }
        #close-stream { color: white; margin-top: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.2rem; }

        .fade-in {
            animation: fadeIn 2s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <meta property="og:description" content="A simple but elegant orchestration of absolute dominance.">
    <meta name="twitter:title" content="α : the zero of a polynomial">

</head>
<body>
    <div class="container fade-in">
        <h1>Sugar.Dom</h1>
        <p>Foundations • Leadership • Lifestyle</p>
        
        <nav>
            <a href="#" id="stream-trigger">Live Stream</a>
            <a href="photos.html">Photography</a>
            <a href="outtakes-play.html">Outtakes / Play</a>
            <a href="cinema.html">Cinema</a>
            <a href="archive.html">Archive</a>
            <a href="alpha.html">Alpha Place</a>
            <a href="https://sugar.services" target="_blank" rel="noopener">Sugar.Services</a>
        </nav>

        <div class="socials">
            <a href="https://onlyfans.com/sugardotdom" target="_blank" rel="noopener">OnlyFans</a>
            <a href="https://x.com/sugardotdom" target="_blank" rel="noopener">X</a>
            <a href="https://snapchat.com/add/sugardotdom" target="_blank" rel="noopener">Snapchat</a>
            <a href="https://instagram.com/sugardotdom" target="_blank" rel="noopener">Instagram</a>
        </div>
    </div>

    <div id="stream-overlay">
        <div id="stream-container">
            <iframe src='https://cbxyz.com/in/?tour=SHBY&campaign=wYpu7&track=embed&room=sugargay222' style='border: none;'></iframe>
        </div>
        <div id="close-stream">Close Stream</div>
    </div>

    <script>
        const trigger = document.getElementById('stream-trigger');
        const overlay = document.getElementById('stream-overlay');
        const closer = document.getElementById('close-stream');

        trigger.addEventListener('click', (e) => {
            e.preventDefault();
            overlay.style.display = 'flex';
        });

        closer.addEventListener('click', () => {
            overlay.style.display = 'none';
        });
    </script>
</body>
</html>
