<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erotic Cinema - Sugar.Dom</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --text-color: #efefef;
            --accent-color: #777777;
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        header a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
        }
        
        header a:hover {
            color: var(--text-color);
        }

        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .filter-btn {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.4rem 1rem;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            transition: all 0.3s ease;
            border-radius: 20px;
        }

        .filter-btn:hover, .filter-btn.active {
            color: var(--bg-color);
            background-color: var(--text-color);
            border-color: var(--text-color);
        }

        /* Cinema specific styles: Single column stack */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .photo-card {
            position: relative;
            overflow: hidden;
            background-color: #1a1a1a;
            cursor: pointer;
            width: 100%;
        }

        /* Enforce native aspect ratio and fit logic */
        .photo-card video {
            width: 100%;
            height: auto;
            max-height: 80vh; /* Don't exceed screen height */
            object-fit: contain; /* Show full frame, don't crop */
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
            background-color: #0c0c0c;
        }

        .palette {
            display: flex;
            justify-content: flex-start;
            gap: 0.4rem;
            margin-top: 0.8rem;
        }

        .color-swatch {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .graded-layer {
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 50%;
            /* Apply a distinct cinematic grade */
            backdrop-filter: contrast(1.15) saturate(1.3) sepia(0.1) brightness(0.9);
            pointer-events: none;
            border-right: 1px dashed rgba(255,255,255,0.5);
            z-index: 5;
        }

        .wipe-slider {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            appearance: none;
            background: transparent;
            outline: none;
            z-index: 10;
            cursor: ew-resize;
            margin: 0;
        }

        .wipe-slider::-webkit-slider-thumb {
            appearance: none;
            width: 40px;
            height: 100vh;
            background: transparent;
            cursor: ew-resize;
        }

        .tags-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: #fff;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .photo-card:hover .tags-overlay, .photo-card.in-view .tags-overlay {
            opacity: 1;
        }

        .meta-data {
            display: block;
            font-size: 0.55rem;
            color: #b0b0b0;
            margin-top: 0.4rem;
            letter-spacing: 0.08rem;
        }

    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <h1>Erotic Cinema</h1>
        <a href="index.html">← Back to Foundation</a>
    </header>

    <div class="filters" id="filters">
        <!-- Filters populated via JS -->
    </div>

    <div class="gallery" id="gallery">
        <!-- Images populated via JS -->
    </div>

    <script>
        let allImages = [];
        let observer;

        async function init() {
            try {
                const response = await fetch('pics_data.json?v=' + new Date().getTime());
                const allData = await response.json();
                allImages = allData.filter(img => img.type === 'video' || img.filename.endsWith('.mp4') || img.filename.endsWith('.webm'));
                
                // Extract unique tags
                const tagSet = new Set();
                allImages.forEach(img => img.tags.forEach(t => tagSet.add(t)));
                const uniqueTags = ["All", ...Array.from(tagSet).sort()];

                // Setup Intersection Observer for mobile scrolling effects
                observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('in-view');
                        } else {
                            entry.target.classList.remove('in-view');
                        }
                    });
                }, { threshold: 0.6 });

                renderFilters(uniqueTags);
                renderGallery(allImages);

            } catch (error) {
                console.error("Error loading images data:", error);
                document.getElementById('gallery').innerHTML = "<p>Unable to load cinema collection at this moment.</p>";
            }
        }

        function renderFilters(tags) {
            const filterContainer = document.getElementById('filters');
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (tag === 'All' ? ' active' : '');
                btn.innerText = tag;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterGallery(tag);
                };
                filterContainer.appendChild(btn);
            });
        }

        function filterGallery(tag) {
            if (tag === 'All') {
                renderGallery(allImages);
            } else {
                const filtered = allImages.filter(img => img.tags.includes(tag));
                renderGallery(filtered);
            }
        }

        function renderGallery(images) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            images.forEach(img => {
                const card = document.createElement('div');
                card.className = 'photo-card';

                const mediaElement = `<video src="pics/${img.filename}" autoplay loop muted playsinline disablePictureInPicture draggable="false"></video>`;
                
                const paletteHtml = img.palette ? `<div class="palette">
                    ${img.palette.map(c => `<div class="color-swatch" style="background-color: ${c}"></div>`).join('')}
                </div>` : '';

                card.innerHTML = `
                    ${mediaElement}
                    <div class="graded-layer"></div>
                    <input type="range" min="0" max="100" value="50" class="wipe-slider" aria-label="Toggle Color Grade">
                    <div class="tags-overlay">
                        <div>${img.tags.join(' • ')}</div>
                        ${img.camera ? `<div class="meta-data">${img.camera.focalLength} • ${img.camera.fstop} • ${img.camera.iso}</div>` : ''}
                        ${img.location ? `<div class="meta-data">${img.location}</div>` : ''}
                        ${paletteHtml}
                    </div>
                `;
                
                const slider = card.querySelector('.wipe-slider');
                const gradedLayer = card.querySelector('.graded-layer');
                if (slider && gradedLayer) {
                    slider.addEventListener('input', (e) => {
                        gradedLayer.style.width = e.target.value + '%';
                    });
                }
                
                gallery.appendChild(card);
                if (observer) observer.observe(card);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
